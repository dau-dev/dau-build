# @package platform

# dpv1 (NiteFury XC7A200T) as data. The XDMA personality below is the
# authoritative source: byte-for-byte the proven bring-up core's value_src=user
# XCI parameters (all 47 — a hand-picked subset is memory-dead on hardware).
# Every value is quoted so it survives ccflow's coerce_numbers_to_str intact
# (e.g. "000" must not become "0"). Order is preserved to match the generated
# Vivado CONFIG.* block byte-for-byte.
_target_: dau_build.platforms.PlatformDefinition
name: dpv1
part: xc7a200tfbg484-2
program_method: jtag
# lane index -> GTPE2 channel site: the reversed lane-to-GT-channel mapping
# the dpv1 board requires, applied as a pre-opt_design implementation hook
# (XDC-time LOCs conflict with the XDMA IP's internal BEL/LOC constraints)
lane_placements:
  - [3, GTPE2_CHANNEL_X0Y7]
  - [0, GTPE2_CHANNEL_X0Y6]
  - [2, GTPE2_CHANNEL_X0Y5]
  - [1, GTPE2_CHANNEL_X0Y4]
# board pin constraints (the shell project generator prepends its banner);
# byte-for-byte the proven bring-up XDC
constraints_xdc: |
  # DAU platform variant 1 (dpv1) pin constraints. GT channel LOCs (the lane swizzle) are applied by
  # the pre-opt_design implementation hook, never here: XDC-time LOCs conflict
  # with the XDMA IP's internal BEL/LOC constraints.

  set_property PACKAGE_PIN A10 [get_ports {pcie_mgt_rxn[0]}]
  set_property PACKAGE_PIN B10 [get_ports {pcie_mgt_rxp[0]}]
  set_property PACKAGE_PIN A6 [get_ports {pcie_mgt_txn[0]}]
  set_property PACKAGE_PIN B6 [get_ports {pcie_mgt_txp[0]}]
  set_property PACKAGE_PIN A8 [get_ports {pcie_mgt_rxn[1]}]
  set_property PACKAGE_PIN B8 [get_ports {pcie_mgt_rxp[1]}]
  set_property PACKAGE_PIN A4 [get_ports {pcie_mgt_txn[1]}]
  set_property PACKAGE_PIN B4 [get_ports {pcie_mgt_txp[1]}]
  set_property PACKAGE_PIN C11 [get_ports {pcie_mgt_rxn[2]}]
  set_property PACKAGE_PIN D11 [get_ports {pcie_mgt_rxp[2]}]
  set_property PACKAGE_PIN C5 [get_ports {pcie_mgt_txn[2]}]
  set_property PACKAGE_PIN D5 [get_ports {pcie_mgt_txp[2]}]
  set_property PACKAGE_PIN C9 [get_ports {pcie_mgt_rxn[3]}]
  set_property PACKAGE_PIN D9 [get_ports {pcie_mgt_rxp[3]}]
  set_property PACKAGE_PIN C7 [get_ports {pcie_mgt_txn[3]}]
  set_property PACKAGE_PIN D7 [get_ports {pcie_mgt_txp[3]}]

  set_property PACKAGE_PIN F6 [get_ports {pcie_clkin_clk_p[0]}]
  set_property PACKAGE_PIN E6 [get_ports {pcie_clkin_clk_n[0]}]

  set_property PACKAGE_PIN J1 [get_ports pci_reset]
  set_property IOSTANDARD LVCMOS33 [get_ports pci_reset]
  set_false_path -from [get_ports pci_reset]

  set_property PACKAGE_PIN G1 [get_ports {pcie_clkreq_l[0]}]
  set_property IOSTANDARD LVCMOS33 [get_ports {pcie_clkreq_l[0]}]

  set_property PACKAGE_PIN M1 [get_ports {LED_M2[0]}]
  set_property IOSTANDARD LVCMOS33 [get_ports {LED_M2[0]}]
  set_property PULLUP true [get_ports {LED_M2[0]}]
  set_property DRIVE 8 [get_ports {LED_M2[0]}]

  set_property BITSTREAM.CONFIG.OVERTEMPPOWERDOWN ENABLE [current_design]
  set_property BITSTREAM.CONFIG.EXTMASTERCCLK_EN Div-1 [current_design]
  set_property BITSTREAM.CONFIG.SPI_BUSWIDTH 4 [current_design]
  set_property BITSTREAM.CONFIG.SPI_FALL_EDGE YES [current_design]
  set_property BITSTREAM.GENERAL.COMPRESS TRUE [current_design]
  set_property CONFIG_VOLTAGE 3.3 [current_design]
  set_property CFGBVS VCCO [current_design]
# Placeable *datapath* capacity, not raw part capacity. Vivado reports
# 133800 LUT / 267600 FF available on xc7a200tfbg484-2 (not the 134600 /
# 269200 slice-math numbers), and the shell infrastructure a composition
# never prices (XDMA + MIG DDR3 + interconnect) measures 21596 LUT /
# 23905 FF / 29.5 BRAM36 / 0 DSP placed on the proven bring-up build
# (~24.7K LUT derived on bar-noc). Budget = available minus a
# 25K LUT / 25K FF / 30 BRAM36 shell reservation, so fits() checks what a
# composition datapath may actually place.
budget:
  _target_: dau_build.platforms.ResourceBudget
  lut: 108800
  ff: 242600
  bram36: 335
  dsp: 740
# how the bench host reaches the board: the proven endpoint identity,
# the Thunderbolt bridge chain rescanned bottom-up after reprogramming, the
# runtime-PM device patterns held during hardware sessions, and the JTAG cable
host_access:
  _target_: dau_build.platforms.HostAccess
  pci_id: "10ee:7011"
  endpoint_bdf: "0000:04:00.0"
  rescan_bdfs:
    - "0000:03:01.0"
    - "0000:02:00.0"
    - "0000:00:0d.3"
    - "0000:00:0d.2"
    - "0000:00:0d.0"
    - "0000:00:07.2"
    - "0000:00:07.0"
  runtime_pm_patterns:
    - Thunderbolt
    - JHL
    - "10ee:7011"
    - Xilinx
  runtime_pm_executable: dau-utils-pci-runtime-pm
  jtag_cable: digilent_hs2
memory:
  _target_: dau_build.platforms.PlatformMemory
  kind: ddr3
  size_bytes: 1073741824
  mig_prj: dpv1_mig.prj
  bandwidth_bytes_per_s: 1600000000
  # the memory system's additions to the board XDC: the controller's 200 MHz
  # reference IOSTANDARD (pin placement lives in the MIG .prj) and the
  # calibration-complete LED
  constraints_xdc: |
    set_property IOSTANDARD LVDS_25 [get_ports sys_clk_clk_p]
    set_property IOSTANDARD LVDS_25 [get_ports sys_clk_clk_n]

    set_property PACKAGE_PIN H4 [get_ports LED_A4]
    set_property IOSTANDARD LVCMOS33 [get_ports LED_A4]
    set_property PULLUP true [get_ports LED_A4]
    set_property DRIVE 8 [get_ports LED_A4]
host_link:
  _target_: dau_build.platforms.HostLink
  interface: pcie-xdma
  pcie_lanes: 4
  # the proven host trains x2 at 5.0 GT/s over Thunderbolt despite the X4
  # personality; bring-up checks compare against the trained values
  expected_link_width: 2
  expected_link_speed_gts: 5.0
  xdma_personality:
    _target_: dau_build.platforms.XdmaPersonality
    params:
      mode_selection: "Advanced"
      pl_link_cap_max_link_width: "X4"
      pl_link_cap_max_link_speed: "5.0_GT/s"
      axi_data_width: "128_bit"
      axisten_freq: "125"
      xdma_axi_intf_mm: "AXI_Memory_Mapped"
      xdma_rnum_chnl: "1"
      xdma_wnum_chnl: "1"
      xdma_sts_ports: "false"
      axilite_master_en: "true"
      axilite_master_size: "128"
      axilite_master_scale: "Kilobytes"
      axil_master_64bit_en: "true"
      axil_master_prefetchable: "true"
      xdma_pcie_64bit_en: "true"
      xdma_pcie_prefetchable: "true"
      plltype: "QPLL1"
      cfg_mgmt_if: "false"
      copy_pf0: "true"
      runbit_fix: "false"
      en_ext_ch_gt_drp: "false"
      en_pcie_drp: "false"
      en_transceiver_status_ports: "false"
      enable_gen4: "false"
      vendor_id: "10EE"
      pf0_device_id: "7011"
      pf0_Use_Class_Code_Lookup_Assistant: "false"
      pf0_base_class_menu: "Device_was_built_before_Class_Code_definitions_were_finalized"
      pf0_sub_class_interface_menu: "All_currently_implemented_devices_except_VGA-compatible_devices"
      pf0_class_code: "120000"
      pf0_class_code_base: "12"
      pf0_class_code_sub: "00"
      pf0_class_code_interface: "00"
      pf0_subsystem_vendor_id: "0"
      pf0_subsystem_id: "0"
      pf0_msix_cap_table_bir: "BAR_3:2"
      pf0_msix_cap_pba_bir: "BAR_3:2"
      pf1_msix_cap_table_size: "000"
      pf1_msix_cap_table_offset: "00000000"
      pf1_msix_cap_pba_offset: "00000000"
      PF0_DEVICE_ID_mqdma: "9024"
      PF2_DEVICE_ID_mqdma: "9024"
      PF3_DEVICE_ID_mqdma: "9024"
      PF0_SRIOV_VF_DEVICE_ID: "0000"
      PF1_SRIOV_VF_DEVICE_ID: "A134"
      PF2_SRIOV_VF_DEVICE_ID: "A234"
      PF3_SRIOV_VF_DEVICE_ID: "A334"
